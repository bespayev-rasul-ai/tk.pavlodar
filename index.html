<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Карта ТК Павлодар</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --accent: #2563eb; --accent-light: #dbeafe;
            --bg: #ffffff; --text: #1e293b; --muted: #94a3b8;
            --border: #e2e8f0; --shadow: 0 4px 24px rgba(0,0,0,0.12); --radius: 14px;
        }
        html, body { height: 100%; overflow: hidden; font-family: 'Nunito', -apple-system, sans-serif; background: #f1f5f9; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .search-panel { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 420px; z-index: 2000; }
        .search-wrap { background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .search-input-row { display: flex; align-items: center; padding: 6px 12px 6px 16px; gap: 8px; }
        .search-icon { color: var(--muted); flex-shrink: 0; font-size: 18px; }
        #search { flex: 1; border: none; outline: none; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); background: transparent; padding: 10px 0; }
        #search::placeholder { color: var(--muted); font-weight: 400; }
        #clear-btn { display: none; background: var(--border); border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 13px; color: var(--muted); flex-shrink: 0; align-items: center; justify-content: center; }
        #clear-btn.visible { display: flex; }
        .search-divider { height: 1px; background: var(--border); display: none; }
        .search-divider.visible { display: block; }
        #results { max-height: 260px; overflow-y: auto; overscroll-behavior: contain; }
        .result-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
        .result-item:last-child { border-bottom: none; }
        .result-item:active, .result-item:hover { background: var(--accent-light); }
        .result-pin { width: 28px; height: 28px; background: var(--accent-light); color: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
        .result-sub { font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 1px; }
        .no-results { padding: 16px; text-align: center; color: var(--muted); font-size: 14px; }

        #toast { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: white; padding: 10px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; z-index: 3000; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .btn-locate { position: absolute; bottom: 40px; right: 16px; z-index: 2000; width: 52px; height: 52px; background: var(--bg); border: none; border-radius: 14px; box-shadow: var(--shadow); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.15s; }
        .btn-locate:active { transform: scale(0.93); background: var(--accent-light); }

        .leaflet-control-layers { border: none!important; box-shadow: var(--shadow)!important; border-radius: var(--radius)!important; }
        .leaflet-control-layers-toggle { width: 52px!important; height: 52px!important; background-image: none!important; background-color: var(--bg)!important; display: flex!important; align-items: center!important; justify-content: center!important; border-radius: var(--radius)!important; }
        .leaflet-control-layers-toggle::after { content: "🗺️"; font-size: 24px; }
        .leaflet-bottom.leaflet-right { bottom: 40px!important; right: 76px!important; }
        .leaflet-control-zoom { display: none!important; }
        .leaflet-control-attribution { font-size: 10px!important; }

        .user-dot { width: 14px; height: 14px; background: var(--accent); border: 3px solid white; border-radius: 50%; box-shadow: 0 2px 8px rgba(37,99,235,0.5); position: relative; }
        .user-pulse { width: 14px; height: 14px; background: rgba(37,99,235,0.35); border-radius: 50%; position: absolute; top: 0; left: 0; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(4); opacity: 0; } }

        .leaflet-popup-content-wrapper { border-radius: 12px!important; box-shadow: var(--shadow)!important; font-family: 'Nunito', sans-serif!important; }
        .leaflet-popup-content { margin: 12px 16px!important; font-size: 14px!important; line-height: 1.5!important; }
        .popup-title { font-weight: 700; font-size: 15px; color: var(--accent); margin-bottom: 4px; }
        .popup-desc { color: var(--text); }

        .slider-wrap { margin-top: 8px; width: 100%; max-width: 260px; }
        .slider-img { width: 100%; max-width: 220px; min-width: 80px; height: 150px; max-height: 25vw; min-height: 60px; object-fit: cover; border-radius: 8px; display: block; margin: 0 auto; cursor: zoom-in; transition: opacity 0.2s; }
        .slider-img:hover { opacity: 0.92; }
        .slider-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; gap: 4px; }
        .slider-btn { flex: 1; padding: 6px; border: none; background: #2563eb; color: white; border-radius: 8px; font-size: 18px; cursor: pointer; line-height: 1; }
        .slider-btn:active { background: #1d4ed8; }
        .slider-counter { font-size: 12px; color: #94a3b8; text-align: center; min-width: 40px; }
        .slider-open-btn { width: 100%; margin-top: 6px; padding: 7px; border: none; background: var(--accent-light); color: var(--accent); border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
        .slider-open-btn:active { background: #bfdbfe; }

        #lightbox {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99999; background: #000;
            display: none; flex-direction: column;
            overflow: hidden; -webkit-overflow-scrolling: touch;
        }
        #lightbox.active { display: flex !important; }

        .lb-header {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: env(safe-area-inset-top, 16px) 20px 16px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 20;
        }
        .lb-title { color: #fff; font-size: 15px; font-weight: 700; flex: 1; }
        .lb-counter { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; margin: 0 12px; }
        .lb-close { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }

        .lb-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 70px 16px 100px; position: relative; overflow: hidden; }
        .lb-photo { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; user-select: none; -webkit-user-drag: none; transition: opacity 0.25s ease; }
        .lb-photo.loading { opacity: 0.3; }

        .lb-arrow { position: absolute; top: 50%; z-index: 20; transform: translateY(-50%); background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 50%; width: 46px; height: 46px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-tap-highlight-color: transparent; transition: opacity 0.2s; }
        .lb-arrow:active { background: rgba(255,255,255,0.3); }
        .lb-arrow.hide { opacity: 0; pointer-events: none; }
        .lb-prev { left: 12px; }
        .lb-next { right: 12px; }

        .lb-dots { position: absolute; bottom: 28px; left: 0; right: 0; display: flex; justify-content: center; gap: 7px; z-index: 20; }
        .lb-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background 0.2s, transform 0.2s; cursor: pointer; }
        .lb-dot.active { background: #fff; transform: scale(1.35); }

        .lb-hint { position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 12px; pointer-events: none; z-index: 20; transition: opacity 1s; }
    </style>
</head>
<body>

<div class="search-panel">
    <div class="search-wrap">
        <div class="search-input-row">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Поиск по номеру ТК..." autocomplete="off">
            <button id="clear-btn" aria-label="Очистить">✕</button>
        </div>
        <div class="search-divider" id="divider"></div>
        <div id="results"></div>
    </div>
</div>

<div id="map"></div>
<button class="btn-locate" id="btn-locate" title="Моё местоположение">📍</button>
<div id="toast"></div>

<div id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-header">
        <div class="lb-title" id="lb-title"></div>
        <div class="lb-counter" id="lb-counter"></div>
        <button class="lb-close" id="lb-close">✕</button>
    </div>
    <div class="lb-body" id="lb-body">
        <img class="lb-photo" id="lb-photo" src="" alt="">
        <button class="lb-arrow lb-prev" id="lb-prev">‹</button>
        <button class="lb-arrow lb-next" id="lb-next">›</button>
    </div>
    <div class="lb-dots" id="lb-dots"></div>
    <div class="lb-hint" id="lb-hint">← Свайп для переключения →</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
(function () {
    'use strict';

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnWaUNZ-F1bZZ3CdDQ5Ejushcn2RlsJ2aYVO6gu1j6FVD1Ha1kYWcSqp1TPdldtvRPmd114CkgjXBC/pub?output=csv';

    let _uid = 0;
    function uid() { return 'sl_' + (++_uid); }

    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    const TRANSLIT = {a:'а',b:'б',c:'с',d:'д',e:'е',f:'ф',g:'г',h:'х',i:'и',j:'й',k:'к',l:'л',m:'м',n:'н',o:'о',p:'п',q:'к',r:'р',s:'с',t:'т',u:'у',v:'в',w:'в',x:'кс',y:'у',z:'з'};
    function normalize(str) {
        if (!str) return '';
        return str.toString().toLowerCase().replace(/ё/g,'е').replace(/[а-яa-z]/g, ch => TRANSLIT[ch]||ch).replace(/[^а-яa-z0-9]/g,'');
    }

    let toastTimer;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    const dgis = L.tileLayer('https://tile{s}.maps.2gis.com/tiles?z={z}&x={x}&y={y}&v=1', { subdomains:'0123', attribution:'2GIS' });
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', subdomains:'abc' });
    const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], attribution:'Google Satellite' });

    const map = L.map('map', { center:[52.287,76.967], zoom:14, layers:[dgis], zoomControl:false });

    L.control.layers({
        "<span style='font-size:15px'>🗺️ 2ГИС</span>": dgis,
        "<span style='font-size:15px'>🌍 OSM</span>": osm,
        "<span style='font-size:15px'>🛰️ Спутник</span>": googleSat
    }, null, { collapsed:true, position:'bottomright' }).addTo(map);

    let tileErrors = 0;
    dgis.on('tileerror', () => { tileErrors++; if (tileErrors > 5 && map.hasLayer(dgis)) { map.removeLayer(dgis); map.addLayer(osm); showToast('⚠️ 2ГИС недоступен'); } });

    const lb = {
        el: document.getElementById('lightbox'),
        body: document.getElementById('lb-body'),
        photo: document.getElementById('lb-photo'),
        title: document.getElementById('lb-title'),
        counter: document.getElementById('lb-counter'),
        dots: document.getElementById('lb-dots'),
        prev: document.getElementById('lb-prev'),
        next: document.getElementById('lb-next'),
        hint: document.getElementById('lb-hint'),
        photos: [], cur: 0,

        open(photos, idx, title) {
            lb.photos = photos; lb.cur = idx || 0;
            lb.title.textContent = title ? 'ТК: ' + title : '';
            lb.el.classList.add('active');
            document.body.style.overflow = 'hidden';
            lb.dots.innerHTML = '';
            photos.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'lb-dot';
                dot.addEventListener('click', () => lb.go(i));
                lb.dots.appendChild(dot);
            });
            lb.hint.style.opacity = '1';
            clearTimeout(lb._hintTimer);
            lb._hintTimer = setTimeout(() => lb.hint.style.opacity = '0', 3000);
            lb.show(lb.cur);
        },
        close() {
            lb.el.classList.remove('active');
            document.body.style.overflow = '';
            lb.photo.src = '';
        },
        go(idx) {
            idx = Math.max(0, Math.min(idx, lb.photos.length - 1));
            if (idx === lb.cur && lb.photo.src) return;
            lb.cur = idx; lb.show(idx);
        },
        show(idx) {
            lb.photo.classList.add('loading');
            lb.photo.onload = () => lb.photo.classList.remove('loading');
            lb.photo.onerror = () => { lb.photo.classList.remove('loading'); lb.photo.alt = '⚠️ Фото не загрузилось'; };
            lb.photo.src = lb.photos[idx];
            lb.photo.alt = 'Фото ' + (idx + 1);
            lb.counter.textContent = (idx + 1) + ' / ' + lb.photos.length;
            lb.prev.classList.toggle('hide', idx === 0);
            lb.next.classList.toggle('hide', idx === lb.photos.length - 1);
            Array.from(lb.dots.children).forEach((d, i) => d.classList.toggle('active', i === idx));
        }
    };

    document.getElementById('lb-close').addEventListener('click', () => lb.close());
    lb.prev.addEventListener('click', () => lb.go(lb.cur - 1));
    lb.next.addEventListener('click', () => lb.go(lb.cur + 1));
    document.addEventListener('keydown', e => {
        if (!lb.el.classList.contains('active')) return;
        if (e.key === 'Escape') lb.close();
        if (e.key === 'ArrowLeft') lb.go(lb.cur - 1);
        if (e.key === 'ArrowRight') lb.go(lb.cur + 1);
    });
    lb.body.addEventListener('click', e => { if (e.target === lb.body) lb.close(); });

    (function () {
        let startX = 0, startY = 0, swiping = false;
        lb.body.addEventListener('touchstart', e => {
            if (e.touches.length !== 1) return;
            swiping = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        }, { passive: true });
        lb.body.addEventListener('touchend', e => {
            if (!swiping) return; swiping = false;
            const dx = e.changedTouches[0].clientX - startX;
            const dy = Math.abs(e.changedTouches[0].clientY - startY);
            if (Math.abs(dx) > 60 && Math.abs(dx) > dy) {
                if (dx < 0) lb.go(lb.cur + 1); else lb.go(lb.cur - 1);
            }
        }, { passive: true });
    })();

    window._lbOpen = function(photosJson, idx, title) {
        try { lb.open(JSON.parse(photosJson), idx, title); } catch(e) { console.error('lbOpen:', e); }
    };

    window.slidePhoto = function(id, dir, photosJson) {
        const img = document.getElementById(id + '_img');
        const counter = document.getElementById(id + '_cnt');
        if (!img) return;
        let photos;
        try { photos = JSON.parse(photosJson); } catch(e) { return; }
        let cur = parseInt(img.dataset.index || 0);
        cur = (cur + dir + photos.length) % photos.length;
        img.dataset.index = cur; img.src = photos[cur]; img.dataset.photos = photosJson;
        if (counter) counter.textContent = (cur + 1) + ' / ' + photos.length;
    };

    const markersData = [];
    const markerClusterGroup = L.markerClusterGroup();

    Papa.parse(CSV_URL, {
        download: true, header: true, skipEmptyLines: true,
        complete(results) {
            if (!results.data.length) { showToast('⚠️ CSV пустой'); return; }
            results.data.forEach(row => {
                const get = (...keys) => {
                    for (const k of keys) {
                        const f = Object.keys(row).find(rk => rk.trim().toLowerCase() === k.toLowerCase());
                        if (f && row[f] !== undefined) return String(row[f]).trim();
                    }
                    return '';
                };
                const name = get('name');
                const lat = parseFloat(get('lat'));
                const lng = parseFloat(get('lng'));
                const desc = get('description','desc');
                const photos = get('photo','photos').split(',').map(s => s.trim()).filter(Boolean);
                if (isNaN(lat) || isNaN(lng)) return;

                const id = uid();
                const photosJson = JSON.stringify(photos);
                const safeName = esc(name);
                const safeDesc = esc(desc);
                const popupDiv = document.createElement('div');
                let html = '<div class="popup-title">ТК: ' + safeName + '</div>';
                if (safeDesc) html += '<div class="popup-desc">' + safeDesc + '</div>';
                if (photos.length > 0) {
                    html += '<div class="slider-wrap">'
                        + '<img id="' + id + '_img" class="slider-img"'
                        + ' src="' + esc(photos[0]) + '"'
                        + ' data-index="0"'
                        + " data-photos='" + esc(photosJson) + "'"
                        + ' loading="lazy"'
                        + ' alt="Фото ТК ' + safeName + '">'
                        + '</div>';
                    if (photos.length > 1) {
                        html += '<div class="slider-controls">'
                            + '<button class="slider-btn popup-prev" data-id="' + id + '">‹</button>'
                            + '<span id="' + id + '_cnt" class="slider-counter">1 / ' + photos.length + '</span>'
                            + '<button class="slider-btn popup-next" data-id="' + id + '">›</button>'
                            + '</div>';
                    }
                    html += '<button class="slider-open-btn popup-open"'
                        + " data-photos='" + esc(photosJson) + "'"
                        + ' data-title="' + safeName + '"'
                        + ' data-id="' + id + '">'
                        + '🔍 Открыть на весь экран</button>';
                }
                popupDiv.innerHTML = html;
                const marker = L.marker([lat, lng]);
                marker.bindPopup(popupDiv, { maxWidth: 260 });
                markerClusterGroup.addLayer(marker);
                markersData.push({ key: normalize(name), name, desc, marker });
            });
            map.addLayer(markerClusterGroup);
            showToast('✅ Загружено ' + markersData.length + ' объектов');
        },
        error(err) { console.error('CSV error:', err); showToast('❌ Не удалось загрузить данные'); }
    });

    map.on('popupopen', e => {
        const popupEl = e.popup.getElement();
        if (!popupEl) return;
        popupEl.querySelectorAll('.popup-prev').forEach(btn => {
            btn.onclick = () => {
                const imgEl = popupEl.querySelector('#' + btn.dataset.id + '_img');
                if (imgEl) slidePhoto(btn.dataset.id, -1, imgEl.dataset.photos || '[]');
            };
        });
        popupEl.querySelectorAll('.popup-next').forEach(btn => {
            btn.onclick = () => {
                const imgEl = popupEl.querySelector('#' + btn.dataset.id + '_img');
                if (imgEl) slidePhoto(btn.dataset.id, 1, imgEl.dataset.photos || '[]');
            };
        });
        popupEl.querySelectorAll('.popup-open').forEach(btn => {
            btn.onclick = () => {
                const pj = btn.getAttribute('data-photos') || '[]';
                const t = btn.getAttribute('data-title') || '';
                const imgEl = popupEl.querySelector('#' + btn.dataset.id + '_img');
                const idx = parseInt(imgEl?.dataset.index || '0', 10);
                window._lbOpen(pj, idx, t);
            };
        });
        popupEl.querySelectorAll('.slider-img').forEach(img => {
            img.onclick = () => {
                const pj = img.dataset.photos || '[]';
                const t = img.alt.replace(/^Фото ТК\s*/, '');
                const idx = parseInt(img.dataset.index || '0', 10);
                window._lbOpen(pj, idx, t);
            };
            img.onerror = () => { img.style.display = 'none'; };
        });
    });

    const input = document.getElementById('search');
    const resDiv = document.getElementById('results');
    const clearBtn = document.getElementById('clear-btn');
    const divider = document.getElementById('divider');

    function hideResults() { resDiv.innerHTML = ''; divider.classList.remove('visible'); }
    function clearSearch() { input.value = ''; clearBtn.classList.remove('visible'); hideResults(); input.focus(); }
    clearBtn.addEventListener('click', clearSearch);

    resDiv.addEventListener('click', e => {
        const item = e.target.closest('.result-item');
        if (!item) return;
        const idx = parseInt(item.dataset.idx, 10);
        const x = markersData[idx];
        if (!x) return;
        map.setView(x.marker.getLatLng(), 18);
        x.marker.openPopup();
        input.value = x.name;
        clearBtn.classList.add('visible');
        hideResults();
    });

    let searchTimer;
    input.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            const q = normalize(input.value);
            clearBtn.classList.toggle('visible', input.value.length > 0);
            if (q.length < 1) { hideResults(); return; }

            const found = markersData.map((x, i) => ({x, i})).filter(({x}) => x.key.includes(q));
            resDiv.innerHTML = '';

            if (!found.length) {
                divider.classList.add('visible');
                resDiv.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                return;
            }

            divider.classList.add('visible');
            const frag = document.createDocumentFragment();
            found.slice(0, 20).forEach(({x, i}) => {
                const el = document.createElement('div');
                el.className = 'result-item';
                el.dataset.idx = i;
                el.innerHTML = '<div class="result-pin">📦</div><div><div>ТК: <b>' + esc(x.name) + '</b></div>' + (x.desc ? '<div class="result-sub">' + esc(x.desc) + '</div>' : '') + '</div>';
                frag.appendChild(el);
            });
            resDiv.appendChild(frag);
        }, 180);
    });

    map.on('click', hideResults);

    /* ─── ГЕОЛОКАЦИЯ ─── */
    const userIcon = L.divIcon({
        className: '',
        html: '<div class="user-dot"><div class="user-pulse"></div></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
    });
    let userMarker = null, watchStarted = false, locateActive = false;

    function startLocate() {
        locateActive = true;
        map.locate({ setView: true, maxZoom: 17, watch: true, enableHighAccuracy: true });
        showToast('🔍 Определяем местоположение…');
    }

    map.on('locationfound', e => {
        if (userMarker) userMarker.setLatLng(e.latlng);
        else userMarker = L.marker(e.latlng, { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
    });

    map.on('locationerror', () => {
        showToast('📍 Геолокация недоступна');
        locateActive = false;
        watchStarted = false;
    });

    document.getElementById('btn-locate').addEventListener('click', () => {
        if (!watchStarted) { watchStarted = true; startLocate(); }
        else if (userMarker) map.setView(userMarker.getLatLng(), 17);
        else if (!locateActive) startLocate();
    });

    document.addEventListener('visibilitychange', () => {
        if (document.hidden && locateActive) { map.stopLocate(); locateActive = false; }
        else if (!document.hidden && watchStarted && !locateActive) startLocate();
    });

})();
</script>
</body>
</html>
